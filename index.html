<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Kamera, Flash & Scan</title>

<!-- Ambil library QR/Barcode Scanner yang ringan dan stabil -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial, sans-serif;
  padding: 10px;
}

.video-container {
  position: relative;
  width: 100%;
  max-width: 500px;
  margin: 20px auto;
}

video {
  width: 100%;
  border-radius: 20px;
  background: #222;
  transform: scaleX(1); /* Pastikan tidak terbalik untuk kamera belakang */
}

/* Garis pemandu scan biar keren kayak aplikasi pro */
.scan-region-highlight {
  position: absolute;
  top: 25%;
  left: 25%;
  width: 50%;
  height: 50%;
  border: 3px dashed #4CAF50;
  border-radius: 10px;
  box-sizing: border-box;
  pointer-events: none;
}

button {
  margin: 10px 5px;
  padding: 12px 20px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.btn-start { background: #4CAF50; color: white; }
.btn-flash { background: #FFC107; color: black; }

#hasil {
  margin-top: 20px;
  padding: 15px;
  background: #222;
  border-radius: 10px;
  border: 1px solid #333;
  word-break: break-all;
}
</style>
</head>
<body>

<h1>Kamera + Flash + Scan Pro</h1>

<button class="btn-start" onclick="startCamera()">Buka Kamera</button>
<button class="btn-flash" id="flashBtn" onclick="toggleFlash()" disabled>⚡ Flash Off</button>

<div class="video-container">
  <video id="video" autoplay playsinline></video>
  <div class="scan-region-highlight"></div>
</div>

<div id="hasil">Mencari barcode/QR code...</div>

<!-- Canvas tersembunyi untuk memproses gambar dari video secara real-time -->
<canvas id="canvas" style="display:none;"></canvas>

<script>
let videoStream = null;
let videoTrack = null;
let isFlashOn = false;

async function startCamera() {
  try {
    // 1. Minta akses kamera belakang secara spesifik
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    });

    videoStream = stream;
    videoTrack = stream.getVideoTracks()[0];

    const videoElement = document.getElementById("video");
    videoElement.srcObject = stream;

    alert("Kamera berhasil dibuka!");

    // 2. Cek apakah HP mendukung fitur Flash/Torch
    const capabilities = videoTrack.getCapabilities();
    const flashBtn = document.getElementById("flashBtn");
    
    if (capabilities.torch) {
      flashBtn.disabled = false; // Aktifkan tombol flash jika disupport
    } else {
      flashBtn.innerText = "⚡ Flash Gak Support";
    }

    // 3. Jalankan fungsi scanner otomatis
    requestAnimationFrame(tick);

  } catch (err) {
    console.error(err);
    alert("Gagal buka kamera:\n\n" + err.message);
  }
}

// Fungsi untuk Menyalakan / Mematikan Flash
async function toggleFlash() {
  if (!videoTrack) return;

  try {
    isFlashOn = !isFlashOn;
    // Terapkan konfigurasi torch (senter) ke track kamera yang aktif
    await videoTrack.applyConstraints({
      advanced: [{ torch: isFlashOn }]
    });

    const flashBtn = document.getElementById("flashBtn");
    flashBtn.innerText = isFlashOn ? "⚡ Flash ON" : "⚡ Flash OFF";
  } catch (err) {
    console.error(err);
    alert("Gagal mengubah status flash: " + err.message);
  }
}

// Fungsi "Looping" untuk mengecek gambar di video secara konstan
function tick() {
  const video = document.getElementById("video");
  const canvasElement = document.getElementById("canvas");
  const canvas = canvasElement.getContext("2d");
  const hasilElement = document.getElementById("hasil");

  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvasElement.height = video.videoHeight;
    canvasElement.width = video.videoWidth;
    
    // Gambar video ke canvas internal
    canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
    
    // Ambil data pixel gambar
    const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
    
    // Proses scanning menggunakan library jsQR
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: "dontInvert",
    });

    // Jika barcode/QR code terdeteksi
    if (code) {
      hasilElement.innerHTML = `
        <strong style="color:#4CAF50;">Hasil Scan:</strong><br>
        <a href="${code.data}" target="_blank" style="color:#FFF;">${code.data}</a>
      `;
      // Bikin HP getar dikit kalau ketemu kode (fitur opsional)
      if (navigator.vibrate) navigator.vibrate(200);
    }
  }
  
  // Jalankan terus menerus selama kamera terbuka
  requestAnimationFrame(tick);
}
</script>

</body>
</html>
