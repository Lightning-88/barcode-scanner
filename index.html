<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barcode Scanner</title>

  <!-- Library Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:20px;
      background:#111;
      font-family:Arial, sans-serif;
      color:white;
      text-align:center;
    }

    .container{
      max-width:500px;
      margin:auto;
    }

    h1{
      margin-bottom:20px;
    }

    #reader{
      width:100%;
      overflow:hidden;
      border-radius:16px;
      border:2px solid #333;
      background:#000;
    }

    .buttons{
      margin-top:20px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    button{
      padding:12px 18px;
      border:none;
      border-radius:10px;
      background:#00b894;
      color:white;
      font-size:16px;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      opacity:0.9;
    }

    .result{
      margin-top:20px;
      background:#1e1e1e;
      padding:15px;
      border-radius:12px;
      text-align:left;
    }

    .result h3{
      margin-top:0;
    }

    #result{
      color:#00ff99;
      word-break:break-word;
      font-size:18px;
    }

    .status{
      margin-top:10px;
      color:#bbb;
      font-size:14px;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>📷 Barcode Scanner</h1>

    <div id="reader"></div>

    <div class="buttons">
      <button id="startBtn">Start</button>
      <button id="stopBtn">Stop</button>
      <button id="flashBtn">Flash</button>
    </div>

    <div class="result">
      <h3>Hasil Scan:</h3>
      <div id="result">Belum ada hasil</div>
    </div>

    <div class="status" id="status">
      Status: Belum aktif
    </div>

  </div>

  <script>

    let html5QrCode;
    let currentCameraId = null;
    let flashOn = false;
    let scannerRunning = false;

    const resultEl = document.getElementById("result");
    const statusEl = document.getElementById("status");

    async function startScanner() {

      if(scannerRunning) return;

      html5QrCode = new Html5Qrcode("reader");

      try {

        const devices = await Html5Qrcode.getCameras();

        if (!devices || devices.length === 0) {
          alert("Kamera tidak ditemukan");
          return;
        }

        // Cari kamera belakang
        const backCamera = devices.find(device =>
          device.label.toLowerCase().includes("back")
        );

        currentCameraId = backCamera
          ? backCamera.id
          : devices[0].id;

        await html5QrCode.start(
          currentCameraId,
          {
            fps: 10,
            qrbox: {
              width: 250,
              height: 250
            }
          },
          (decodedText) => {

            resultEl.innerHTML = decodedText;

            // Vibrate jika support
            if (navigator.vibrate) {
              navigator.vibrate(200);
            }
          },
          (errorMessage) => {
            // ignore scan error
          }
        );

        scannerRunning = true;
        statusEl.innerHTML = "Status: Scanner aktif";

      } catch (err) {
        console.error(err);
        alert("Gagal membuka kamera");
      }
    }

    async function stopScanner() {

      if (!html5QrCode || !scannerRunning) return;

      try {

        await html5QrCode.stop();
        await html5QrCode.clear();

        scannerRunning = false;
        statusEl.innerHTML = "Status: Scanner berhenti";

      } catch (err) {
        console.error(err);
      }
    }

    async function toggleFlash() {

      if (!html5QrCode || !scannerRunning) {
        alert("Scanner belum aktif");
        return;
      }

      try {

        const track = html5QrCode.getRunningTrack();

        const capabilities = track.getCapabilities();

        if (!capabilities.torch) {
          alert("Flash tidak didukung di HP/browser ini");
          return;
        }

        flashOn = !flashOn;

        await track.applyConstraints({
          advanced: [{ torch: flashOn }]
        });

        statusEl.innerHTML = flashOn
          ? "Status: Flash ON"
          : "Status: Flash OFF";

      } catch (err) {
        console.error(err);
        alert("Gagal mengaktifkan flash");
      }
    }

    document
      .getElementById("startBtn")
      .addEventListener("click", startScanner);

    document
      .getElementById("stopBtn")
      .addEventListener("click", stopScanner);

    document
      .getElementById("flashBtn")
      .addEventListener("click", toggleFlash);

  </script>

</body>
</html>
