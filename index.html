<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Barcode Scanner</title>

<!-- Menggunakan ZXing untuk performa scan Barcode Garis yang cepat -->
<script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body {
  background: #121212;
  color: #e0e0e0;
  text-align: center;
  font-family: 'Segoe UI', Arial, sans-serif;
  padding: 15px;
  margin: 0;
}

h1 {
  font-size: 20px;
  margin-bottom: 5px;
}

p {
  font-size: 13px;
  color: #888;
  margin-top: 0;
}

/* Modifikasi Ukuran Kamera POS Mini */
.pos-scanner-box {
  position: relative;
  width: 280px;      /* Ukuran kotak kamera dibuat kecil & compact */
  height: 210px;     /* Rasio 4:3 mini */
  margin: 15px auto;
  border: 3px solid #333;
  border-radius: 12px;
  overflow: hidden;
  background: #000;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover; /* Memotong video agar pas di dalam kotak kecil */
}

/* Garis Laser Merah Khas Scanner POS Kasir */
.laser-line {
  position: absolute;
  top: 50%;
  left: 5%;
  width: 90%;
  height: 2px;
  background-color: #ff3b30;
  box-shadow: 0 0 8px #ff3b30;
  animation: scanAnimation 2s infinite ease-in-out;
  pointer-events: none;
}

@keyframes scanAnimation {
  0% { top: 20%; }
  50% { top: 80%; }
  100% { top: 20%; }
}

/* Desain Tombol Kontrol */
.btn-group {
  margin-bottom: 15px;
}

button {
  padding: 10px 16px;
  font-size: 14px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  margin: 0 5px;
  transition: background 0.2s;
}

.btn-start { background: #007aff; color: white; }
.btn-flash { background: #ffcc00; color: black; }
button:disabled { background: #333; color: #666; cursor: not-allowed; }

#hasil-pos {
  width: 100%;
  max-width: 280px;
  margin: 15px auto;
  padding: 12px;
  background: #1e1e1e;
  border-radius: 8px;
  border: 1px solid #2d2d2d;
  box-sizing: border-box;
}

.sku-text {
  font-size: 18px;
  font-weight: bold;
  color: #34c759;
  letter-spacing: 1px;
  margin-top: 5px;
}
</style>
</head>
<body>

<h1>POS Scanner Mini</h1>
<p>Arahkan barcode garis produk ke dalam kotak</p>

<div class="btn-group">
  <button class="btn-start" onclick="initPOSScanner()">Buka Scanner</button>
  <button class="btn-flash" id="flashBtn" onclick="toggleFlash()" disabled>⚡ Flash Off</button>
</div>

<!-- Container Kamera Kecil -->
<div class="pos-scanner-box">
  <video id="videoInside"></video>
  <div class="laser-line"></div>
</div>

<div id="hasil-pos">
  <div style="font-size: 12px; color: #aaa;">BARCODE TERDETEKSI:</div>
  <div class="sku-text" id="barcodeResult">- Belum Ada Data -</div>
</div>

<script>
let codeReader = null;
let activeVideoTrack = null;
let isFlashOn = false;

async function initPOSScanner() {
  // Menggunakan BrowserMultiFormatReader bawaan ZXing (Bisa baca QR + Barcode Ritel sekaligus)
  codeReader = new ZXing.BrowserMultiFormatReader();
  
  const videoElement = document.getElementById('videoInside');
  const resultElement = document.getElementById('barcodeResult');

  // Konfigurasi kamera belakang
  const constraints = {
    video: {
      facingMode: { ideal: "environment" },
      width: { ideal: 1280 },
      height: { ideal: 720 }
    }
  };

  try {
    // Jalankan scanner langsung ke elemen video
    await codeReader.decodeFromConstraints(constraints, videoElement, (result, err) => {
      if (result) {
        // Efek suara/getar jika sukses (opsional)
        if (navigator.vibrate) navigator.vibrate(100);
        
        // Tampilkan hasil scan barcode di kotak POS
        resultElement.innerText = result.text;
        
        console.log("Barcode ketemu:", result.text);
        
        /* 
          TIPS UNTUK WEB POS:
          Kamu bisa langsung tembak fungsi cariProduk Ke Database di sini, contoh:
          fetch(`/api/produk/${result.text}`).then(...)
        */
      }
      
      // Abaikan error log karena library ini terus me-looping mencari gambar tiap milidetik
      if (err && !(err instanceof ZXing.NotFoundException)) {
        console.error(err);
      }
    });

    // Ambil track video untuk mengendalikan tombol flash
    const stream = videoElement.srcObject;
    if (stream) {
      activeVideoTrack = stream.getVideoTracks()[0];
      const capabilities = activeVideoTrack.getCapabilities();
      const flashBtn = document.getElementById("flashBtn");
      
      if (capabilities.torch) {
        flashBtn.disabled = false;
      }
    }

    alert("Scanner POS Siap!");

  } catch (error) {
    console.error("Gagal inisialisasi ZXing:", error);
    alert("Gagal memuat scanner: " + error.message);
  }
}

async function toggleFlash() {
  if (!activeVideoTrack) return;

  try {
    isFlashOn = !isFlashOn;
    await activeVideoTrack.applyConstraints({
      advanced: [{ torch: isFlashOn }]
    });

    const flashBtn = document.getElementById("flashBtn");
    flashBtn.innerText = isFlashOn ? "⚡ Flash ON" : "⚡ Flash OFF";
  } catch (err) {
    console.error(err);
  }
}
</script>

</body>
</html>
